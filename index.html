<!DOCTYPE html>
<html>
<head>
  <title>Powerpuff Game</title>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
  <script src="https://unpkg.com/@coral-xyz/anchor@latest/dist/browser/index.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    }

    h1 { color: white; }

    .card {
      display:inline-block;
      padding:20px;
      margin:10px;
      border-radius:15px;
      background:white;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover { transform: scale(1.1); }
    .selected { border:3px solid pink; }

    button {
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#ff4d6d;
      color:white;
      font-size:16px;
    }

    #score {
      font-size:30px;
      margin-top:20px;
    }

    #level {
      font-size:20px;
      color:#333;
    }
  </style>
</head>

<body>

<h1>💥 Powerpuff Game</h1>

<button onclick="connect()">🔗 Conectar Wallet</button>

<div>
  <div id="c0" class="card" onclick="selectCharacter(0)">🩷 Bombón</div>
  <div id="c1" class="card" onclick="selectCharacter(1)">💙 Burbuja</div>
  <div id="c2" class="card" onclick="selectCharacter(2)">💚 Bellota</div>
</div>

<br>

<button onclick="start()">🎮 Start</button>
<button onclick="play()">⚡ Play</button>

<div id="score">Score: 0</div>
<div id="level">Nivel: 1</div>

<script>
let provider, program, game;
let character = 0;

const PROGRAM_ID = new solanaWeb3.PublicKey("TU_PROGRAM_ID_AQUI");

async function connect(){
  provider = window.solana;
  await provider.connect();

  const connection = new solanaWeb3.Connection("https://api.devnet.solana.com");

  const wallet = {
    publicKey: provider.publicKey,
    signTransaction: provider.signTransaction,
    signAllTransactions: provider.signAllTransactions
  };

  const anchorProvider = new anchor.AnchorProvider(connection, wallet, {});
  anchor.setProvider(anchorProvider);

  const idl = {
    version:"0.1.0",
    name:"powerpuff_game",
    instructions:[
      {
        name:"initialize",
        accounts:[
          {name:"game",isMut:true,isSigner:true},
          {name:"user",isMut:true,isSigner:true},
          {name:"systemProgram",isMut:false,isSigner:false}
        ],
        args:[{name:"character",type:"u8"}]
      },
      {
        name:"play",
        accounts:[
          {name:"game",isMut:true,isSigner:false}
        ],
        args:[]
      }
    ],
    accounts:[
      {
        name:"game",
        type:{
          kind:"struct",
          fields:[
            {name:"player",type:"publicKey"},
            {name:"character",type:"u8"},
            {name:"score",type:"u64"}
          ]
        }
      }
    ]
  };

  program = new anchor.Program(idl, PROGRAM_ID, anchorProvider);
}

function selectCharacter(c){
  character = c;
  document.querySelectorAll(".card").forEach(e=>e.classList.remove("selected"));
  document.getElementById("c"+c).classList.add("selected");
}

async function start(){
  game = solanaWeb3.Keypair.generate();

  await program.methods.initialize(character)
    .accounts({
      game: game.publicKey,
      user: provider.publicKey,
      systemProgram: solanaWeb3.SystemProgram.programId
    })
    .signers([game])
    .rpc();
}

async function play(){
  await program.methods.play()
    .accounts({
      game: game.publicKey
    })
    .rpc();

  const acc = await program.account.game.fetch(game.publicKey);

  document.getElementById("score").innerText = "Score: " + acc.score;

  let level = Math.floor(acc.score / 20) + 1;
  document.getElementById("level").innerText = "Nivel: " + level;
}
</script>

</body>
</html>
